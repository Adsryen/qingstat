name: cd
on:
    workflow_run:
        workflows: [ci]
        types: [completed]
        branches: [main, v3]

jobs:
    deploy:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        env:
            # Account ID is not secret; required so API-token auth can resolve D1
            # without relying on interactive account selection.
            CLOUDFLARE_ACCOUNT_ID: ef8e0352e51348a84bdf842749cb7491
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: "package.json"
            - uses: pnpm/action-setup@v4
            - run: pnpm install
            - run: pnpm turbo build
            # Apply pending D1 migrations before deploying the Worker so schema
            # and code never drift (e.g. missing visits/pageviews tables → 500s).
            # Token must include Account → D1: Edit (Workers deploy alone is not enough).
            - name: Apply D1 migrations
              working-directory: packages/server
              env:
                  CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
              run: |
                  set -euo pipefail
                  echo "Listing D1 migrations (remote)..."
                  npx wrangler d1 migrations list counterscale --remote
                  echo "Applying D1 migrations (remote)..."
                  npx wrangler d1 migrations apply counterscale --remote
            - uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  workingDirectory: "packages/server"
                  command: |
                      deploy --var VERSION:${{ github.sha }}
