name: cd
on:
    workflow_run:
        workflows: [ci]
        types: [completed]
        branches: [main, v3]

jobs:
    deploy:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: "package.json"
            - uses: pnpm/action-setup@v4
            - run: pnpm install
            - run: pnpm turbo build
            # Apply pending D1 migrations before deploying so schema and code
            # never drift. Requires CLOUDFLARE_API_TOKEN with Account → D1: Edit
            # (Workers Edit alone is not enough; missing D1 scope fails silently
            # after the wrangler banner). Soft-fail so deploy still ships; fix
            # the token permission and re-run to harden this step.
            - name: Apply D1 migrations
              id: d1_migrations
              continue-on-error: true
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ef8e0352e51348a84bdf842749cb7491
                  workingDirectory: "packages/server"
                  command: d1 migrations apply counterscale --remote
            - name: Warn if D1 migrations failed
              if: steps.d1_migrations.outcome == 'failure'
              run: |
                  echo "::warning::D1 migrations failed. Ensure CLOUDFLARE_API_TOKEN has Account → D1: Edit, then re-run CD. Deploy will continue so code still ships."
            - uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  accountId: ef8e0352e51348a84bdf842749cb7491
                  workingDirectory: "packages/server"
                  command: |
                      deploy --var VERSION:${{ github.sha }}
