name: cd
on:
    workflow_run:
        workflows: [ci]
        types: [completed]
        branches: [main, v3]

jobs:
    deploy:
        if: ${{ github.event.workflow_run.conclusion == 'success' }}
        runs-on: ubuntu-latest
        steps:
            - uses: actions/checkout@v4
            - uses: actions/setup-node@v4
              with:
                  node-version-file: "package.json"
            - uses: pnpm/action-setup@v4
            - run: pnpm install
            - run: pnpm turbo build
            # Apply pending D1 migrations before deploying the Worker so schema
            # and code never drift (e.g. missing visits/pageviews tables → 500s).
            # Use wrangler-action so the API token is wired the same way as deploy;
            # account_id lives in packages/server/wrangler.json for multi-account tokens.
            - name: Apply D1 migrations
              uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  workingDirectory: "packages/server"
                  command: d1 migrations apply counterscale --remote
            - uses: cloudflare/wrangler-action@v3
              with:
                  apiToken: ${{ secrets.CLOUDFLARE_API_TOKEN }}
                  workingDirectory: "packages/server"
                  command: |
                      deploy --var VERSION:${{ github.sha }}
